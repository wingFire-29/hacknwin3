<!DOCTYPE html>
<html>
<head>
<title>LawAI User Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f0f0f;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#151515;
padding:25px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:30px;
}

.menu a{
display:block;
padding:12px;
margin-bottom:10px;
color:#aaa;
text-decoration:none;
border-radius:8px;
}

.menu a:hover{
background:#ff6a00;
color:white;
}

/* MAIN CONTENT */

.main-content{
flex:1;
padding:40px;
overflow-y:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.header h1{
font-size:32px;
}

.user-info{
display:flex;
align-items:center;
gap:15px;
}

.user-avatar{
width:40px;
height:40px;
border-radius:50%;
background:#ff6a00;
display:flex;
justify-content:center;
align-items:center;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
background:#ff6a00;
}

.card h3{
font-size:18px;
margin-bottom:10px;
}

.card p{
color:#aaa;
font-size:14px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">⚖️ LawAI</div>

<div class="menu">
<a href="/api/dashboard/user/">Dashboard</a>
<a href="/chatbot/">💬 Chat Bot</a>
<a href="/api/signing/logout/">Logout</a>
</div>

</div>

<!-- MAIN CONTENT -->
<div class="main-content">

<div class="header">
<h1>Welcome to Your Dashboard</h1>
<div class="user-info">
<span>Individual User</span>
<div class="user-avatar">👤</div>
</div>
</div>

<div class="cards">

<div class="card" onclick="location.href='/chatbot/'">
<h3>💬 Legal ChatBot</h3>
<p>Ask questions about Indian law and legal procedures</p>
</div>

<div class="card">
<h3>📋 My Cases</h3>
<p>View your ongoing legal cases</p>
</div>

<div class="card">
<h3>📚 Resources</h3>
<p>Access legal guides and documents</p>
</div>

</div>

</div>

</body>

</html>
