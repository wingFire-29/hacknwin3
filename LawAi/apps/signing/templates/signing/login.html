<!DOCTYPE html>
<html>
<head>
<title>LawAI Login</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.wrapper{
width:900px;
background:#fff;
border-radius:20px;
padding:40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.left{
width:45%;
text-align:center;
}

.left img{
width:220px;
}

.right{
width:45%;
}

.card{
background:#fafafa;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

h2{
margin-bottom:10px;
}

p{
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#f06d2f;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#d95f28;
}

.google{
background:white;
border:1px solid #ddd;
color:#444;
margin-top:10px;
}

.link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.link a{
color:#f06d2f;
text-decoration:none;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.error{
color:red;
margin-bottom:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="left">

<div class="logo">LawAI</div>

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

</div>

<div class="right">

<div class="card">

<h2>Welcome Back</h2>
<p>Please login to continue</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="email" name="email" placeholder="Your Email">

<input type="password" name="password" placeholder="Your Password">

<button type="submit">Login</button>

</form>

<div class="link">
Don't have an account?
<a href="/api/signing/signup/">Sign Up</a>
</div>

</div>

</div>

</div>

</body>
</html>
